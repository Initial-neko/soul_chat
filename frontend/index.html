<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Soul Chat - 情感陪伴聊天机器人</title>
  <link rel="stylesheet" href="/style.css">
</head>
<body>
  <div class="container">
    <!-- Header -->
    <header class="header">
      <h1>Soul Chat</h1>
      <p>情感陪伴聊天机器人</p>
    </header>

    <!-- Chat Area -->
    <div class="chat-area" id="chatArea">
      <div class="welcome-message">
        <p>你好呀！我是 Soul Chat，很高兴认识你~</p>
        <p>可以直接打字聊天，或者点击麦克风录音发送语音哦！</p>
      </div>
    </div>

    <!-- Input Area -->
    <div class="input-area">
      <div class="text-input-row">
        <input
          type="text"
          id="textInput"
          placeholder="在这里输入文字..."
          autocomplete="off"
        >
        <button id="sendBtn" class="send-btn">发送</button>
      </div>

      <div class="control-row">
        <button id="micBtn" class="mic-btn" title="点击录音">
          <span class="mic-icon">🎤</span>
          <span class="mic-text">录音</span>
        </button>

        <label class="tts-toggle">
          <input type="checkbox" id="ttsToggle" checked>
          <span>🔊 TTS 语音回复</span>
        </label>

        <button id="clearBtn" class="clear-btn">清空对话</button>
      </div>
    </div>

    <!-- Audio Player -->
    <div class="audio-player" id="audioPlayer" style="display: none;">
      <audio id="audioElement" controls autoplay></audio>
    </div>

    <!-- Status -->
    <div class="status" id="status">已连接</div>
  </div>

  <script type="module" src="/main.js"></script>
</body>
</html>
